version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
    cooldown:
      default-days: 5
      semver-major-days: 14
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]
    cooldown:
      default-days: 5
      semver-major-days: 14
